<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Travel Collage Template</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&family=Caveat:wght@700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#ece7e2;
    font-family:'Oswald', sans-serif;
    width:1000px;
    height:1500px;
    margin:0;
    padding:0;
}

.poster{
    width:100%;
    height:100%;
    background:#f6f1ec;
    overflow:hidden;
}

/* =========================
   HERO
========================= */

.hero{
    position:relative;
    height:600px;
    overflow:hidden;
}

.hero img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

.overlay{
    position:absolute;
    inset:0;
    background:linear-gradient(
        to bottom,
        rgba(255,255,255,0.55),
        rgba(255,255,255,0.15)
    );
}

.title{
    position:absolute;
    top:40px;
    left:40px;
    z-index:2;
    color:#222;
}

.title .number{
    font-size:120px;
    line-height:1;
    color:#c97c87;
    font-weight:700;
}

.title .main{
    font-size:72px;
    line-height:0.95;
    text-transform:uppercase;
    font-weight:700;
}

.title .city{
    color:#c97c87;
}

.subtitle{
    display:inline-block;
    margin-top:20px;
    background:#c97c87;
    color:white;
    padding:8px 20px;
    font-size:42px;
    font-family:'Caveat', cursive;
    border-radius:6px;
}

/* =========================
   GRID
========================= */

.grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:10px;
    padding:15px;
    background:#efe8e2;
}

.card{
    background:white;
    border:3px solid #d7cec7;
    position:relative;
}

.card img{
    width:100%;
    height:160px;
    object-fit:cover;
    display:block;
}

.card-title{
    text-align:center;
    padding:8px;
    font-size:20px;
    font-weight:500;
    text-transform:uppercase;
    color:#222;
    line-height:1.2;
}

.badge{
    position:absolute;
    top:10px;
    left:10px;
    width:44px;
    height:44px;
    border-radius:50%;
    background:white;
    border:3px solid #c97c87;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    color:#c97c87;
    font-weight:700;
}

/* =========================
   FOOTER
========================= */

.footer{
    padding:12px;
    text-align:center;
    font-size:20px;
    color:#c97c87;
    background:#f6f1ec;
    border-top:2px solid #ddd;
    letter-spacing:1px;
}

.footer span{
    margin:0 10px;
}
</style>
</head>
<body>

<div class="poster">

    <!-- HERO -->
    <section class="hero">
        <img src="{{heroImage}}" alt="">
        <div class="overlay"></div>

        <div class="title">
            <div class="number">{{number}}</div>

            <div class="main">
                BEST<br>
                THINGS TO DO<br>
                <span class="city">IN {{city}}</span>
            </div>

            <div class="subtitle">
                {{subtitle}}
            </div>
        </div>
    </section>

    <!-- GRID -->
    <section class="grid">

        <div class="card">
            <div class="badge">1</div>
            <img src="{{image1}}">
            <div class="card-title">{{place1}}</div>
        </div>

        <div class="card">
            <div class="badge">2</div>
            <img src="{{image2}}">
            <div class="card-title">{{place2}}</div>
        </div>

        <div class="card">
            <div class="badge">3</div>
            <img src="{{image3}}">
            <div class="card-title">{{place3}}</div>
        </div>

        <div class="card">
            <div class="badge">4</div>
            <img src="{{image4}}">
            <div class="card-title">{{place4}}</div>
        </div>

        <div class="card">
            <div class="badge">5</div>
            <img src="{{image5}}">
            <div class="card-title">{{place5}}</div>
        </div>

        <div class="card">
            <div class="badge">6</div>
            <img src="{{image6}}">
            <div class="card-title">{{place6}}</div>
        </div>

        <div class="card">
            <div class="badge">7</div>
            <img src="{{image7}}">
            <div class="card-title">{{place7}}</div>
        </div>

        <div class="card">
            <div class="badge">8</div>
            <img src="{{image8}}">
            <div class="card-title">{{place8}}</div>
        </div>

        <div class="card">
            <div class="badge">9</div>
            <img src="{{image9}}">
            <div class="card-title">{{place9}}</div>
        </div>

        <div class="card">
            <div class="badge">10</div>
            <img src="{{image10}}">
            <div class="card-title">{{place10}}</div>
        </div>

        <div class="card">
            <div class="badge">11</div>
            <img src="{{image11}}">
            <div class="card-title">{{place11}}</div>
        </div>

        <div class="card">
            <div class="badge">12</div>
            <img src="{{image12}}">
            <div class="card-title">{{place12}}</div>
        </div>

    </section>

    <!-- FOOTER -->
    <div class="footer">
        📍 <span>{{footer}}</span>
    </div>

</div>

</body>
</html>
